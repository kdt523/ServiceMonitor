{% extends "base.html" %}
{% block title %}Login — ServiceMonitor{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 120px)">
  <div style="width:100%;max-width:420px">
    <div class="text-center mb-4">
      <div style="font-size:2rem;margin-bottom:.5rem">🟢</div>
      <h1 style="font-size:1.5rem;font-weight:700">Welcome to ServiceMonitor</h1>
      <p class="text-muted">Sign in to your monitoring dashboard</p>
    </div>

    {% if error %}
    <div class="mb-3 p-3" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#f85149;border-radius:8px;font-size:.875rem">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="g-card">
      <div class="p-4">
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="admin@example.com" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
          <div class="mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me" value="1" />
              <label class="form-check-label" for="remember_me" style="font-size:.85rem;color:var(--text-2)">Remember me for 30 days</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary-g w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
      </div>
    </div>

    <div class="text-center mt-3">
      <a href="/register" class="text-muted" style="font-size:.85rem">Don't have an account? Register</a>
    </div>
  </div>
</div>
{% endblock %}

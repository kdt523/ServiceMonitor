{% extends "base.html" %}
{% block title %}Edit {{ host.name }} — Gonitor{% endblock %}
{% block page_title %}Edit Host{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="/hosts/{{ host.id }}" class="text-muted"><i class="bi bi-arrow-left"></i></a>
      <h1 class="page-title mb-0">Edit: {{ host.name }}</h1>
    </div>

    {% if error %}
    <div class="alert alert-danger mb-3" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#f85149;border-radius:8px">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/hosts/{{ host.id }}/edit">
      <div class="g-card mb-3">
        <div class="g-card-header"><i class="bi bi-hdd-network me-2" style="color:var(--blue)"></i>Host Information</div>
        <div class="p-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Display Name <span class="text-danger">*</span></label>
              <input type="text" name="name" class="form-control" value="{{ host.name }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">URL <span class="text-danger">*</span></label>
              <input type="text" name="url" class="form-control" value="{{ host.url }}" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Canonical Name / FQDN</label>
              <input type="text" name="canonical_name" class="form-control" value="{{ host.canonical_name or '' }}" />
            </div>
            <div class="col-md-3">
              <label class="form-label">IPv4</label>
              <input type="text" name="ipv4" class="form-control" value="{{ host.ipv4 or '' }}" />
            </div>
            <div class="col-md-3">
              <label class="form-label">IPv6</label>
              <input type="text" name="ipv6" class="form-control" value="{{ host.ipv6 or '' }}" />
            </div>
            <div class="col-md-6">
              <label class="form-label">OS / Platform</label>
              <input type="text" name="os" class="form-control" value="{{ host.os or '' }}" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Location / Region</label>
              <input type="text" name="location" class="form-control" value="{{ host.location or '' }}" />
            </div>
            <div class="col-md-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" value="1" {% if host.is_active %}checked{% endif %} />
                <label class="form-check-label" for="is_active">Host is Active</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary-g"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
        <a href="/hosts/{{ host.id }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="button" onclick="confirmDelete({{ host.id }}, '{{ host.name }}')" class="btn btn-outline-danger ms-auto">
          <i class="bi bi-trash me-1"></i>Delete Host
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function confirmDelete(id, name) {
  Swal.fire({
    title: `Delete "${name}"?`,
    icon: 'warning', background: '#1c2128', color: '#e6edf3',
    showCancelButton: true,
    confirmButtonColor: '#f85149', cancelButtonColor: '#30363d',
    confirmButtonText: 'Delete',
  }).then(r => {
    if (r.isConfirmed) {
      const f = document.createElement('form');
      f.method = 'POST'; f.action = `/hosts/${id}/delete`;
      document.body.appendChild(f); f.submit();
    }
  });
}
</script>
{% endblock %}

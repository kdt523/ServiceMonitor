{% extends "base.html" %}
{% block title %}Edit User — Gonitor{% endblock %}
{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="/admin/users" class="text-muted"><i class="bi bi-arrow-left"></i></a>
      <h1 class="page-title mb-0">Edit: {{ target.email }}</h1>
    </div>

    {% if error %}
    <div class="alert mb-3" style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#f85149;border-radius:8px;padding:.75rem 1rem">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="g-card">
      <div class="p-4">
        <form method="POST" action="/admin/users/{{ target.id }}/edit">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control" value="{{ target.first_name or '' }}" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control" value="{{ target.last_name or '' }}" />
            </div>
            <div class="col-12">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input type="email" name="email" class="form-control" value="{{ target.email }}" required />
            </div>
            <div class="col-12">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" value="{{ target.phone or '' }}" />
            </div>
            <div class="col-12">
              <label class="form-label">New Password <span class="text-muted" style="font-size:.78rem">(leave blank to keep current)</span></label>
              <input type="password" name="new_password" class="form-control" placeholder="New password..." minlength="8" />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary-g">Save Changes</button>
            <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
